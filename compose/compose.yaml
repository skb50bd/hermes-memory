# Compose file for the Hermes Agent platform.
# Drop this in ~/infra/ to replace compose.db.yaml.

name: hermes-memory

services:
  postgres:
    # Build locally until GHCR is published
    build:
      context: ../docker/postgres
      dockerfile: Dockerfile
    image: ghcr.io/skb50bd/hermes-postgres:18
    container_name: hermes-postgres
    mem_limit: 2g
    cpus: "2.00"
    restart: unless-stopped
    environment:
      PGDATA: /var/lib/postgresql/data
      POSTGRES_DB: ${HERMES_TEMPLATE_DB:-hermes_template}
      POSTGRES_USER: ${HERMES_PG_USER:-hermes}
      POSTGRES_PASSWORD: ${HERMES_PG_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      database: {}

volumes:
  postgres-data:
    name: hermes-postgres-data

networks:
  database:
    name: database
    driver: bridge
    attachable: true
