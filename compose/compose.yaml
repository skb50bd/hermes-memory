# Compose file for the Hermes Agent platform.
#
# Deploys a single Postgres 18 instance (the hermes-postgres image built
# in CI and published to GHCR) with all 5 extensions preinstalled and
# the hermes-init.sh script bundled for first-boot schema setup.
#
# Usage:
#   cd ~/repos/hermes-memory
#   docker compose -f compose/compose.yaml up -d
#   ./scripts/hermes-bootstrap.sh         # creates hermes_template + per-profile DBs
#
# Override via .env (or environment):
#   HERMES_PG_USER=hermes                 # postgres role (default: hermes)
#   HERMES_PG_PASSWORD=***           # role password (default: changeme)
#   HERMES_TEMPLATE_DB=hermes_template     # template DB name
#   HERMES_POSTGRES_IMAGE=ghcr.io/skb50bd/hermes-memory/hermes-postgres:latest

name: hermes-memory

services:
  postgres:
    image: ${HERMES_POSTGRES_IMAGE:-ghcr.io/skb50bd/hermes-memory/hermes-postgres:latest}
    container_name: hermes-postgres
    mem_limit: 2g
    cpus: "2.00"
    restart: unless-stopped
    environment:
      # PGDATA is the major-version-specific path used by Postgres 18+
      # in the official docker image. Mount the volume at the parent
      # /var/lib/postgresql so the image can manage PGDATA inside.
      PGDATA: /var/lib/postgresql/18/docker
      POSTGRES_DB: ${HERMES_TEMPLATE_DB:-hermes_template}
      POSTGRES_USER: ${HERMES_PG_USER:-hermes}
      POSTGRES_PASSWORD: ${HERMES_PG_PASSWORD:-changeme}
    ports:
      - "${HERMES_PG_HOST_PORT:-10432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      hermes: {}

volumes:
  postgres-data:
    name: hermes-postgres-data

networks:
  hermes:
    name: hermes
    driver: bridge
    attachable: true
