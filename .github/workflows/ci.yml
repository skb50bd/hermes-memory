# ----------------------------------------------------------------------------
# Consolidated CI pipeline for hermes-memory.
#
# Replaces the v1 (C# + Python) workflow with a single Python-only gate
# chain. Linear: lint → unit → integration (testcontainers) → build →
# publish (tag-driven).
#
# IMPORTANT: Do NOT add any job with `runs-on: ubuntu-*-arm64`. GHA's
# hosted arm64 pool is scarce; jobs that need arm64 host queue for hours
# (observed 6681s = 111 min, 2578s = 43 min). Buildx handles multi-arch
# cross-compile on amd64 hosts just fine — see Dockerfile.publish and
# docker/postgres/Dockerfile. Every job below uses `ubuntu-latest`
# (amd64) and produces both archs via
# `platforms: linux/amd64,linux/arm64` in the buildx step.
# ----------------------------------------------------------------------------

name: ci

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      force:
        description: 'Skip path filters (run all jobs)'
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/hermes-postgres
  PLATFORMS: linux/amd64,linux/arm64
  PYTHON_VERSION: '3.11'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # --------------------------------------------------------------------------
  # Stage 0: Detect which paths changed → which downstream jobs to run.
  # Uses dorny/paths-filter so a README change skips heavy jobs.
  # --------------------------------------------------------------------------
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      lint: ${{ steps.filter.outputs.lint }}
      tests: ${{ steps.filter.outputs.tests }}
      integration: ${{ steps.filter.outputs.integration }}
      docker: ${{ steps.filter.outputs.docker }}
      workflow: ${{ steps.filter.outputs.workflow }}
      pkg: ${{ steps.filter.outputs.pkg }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # Pin the diff base so workflow_dispatch (no `before` payload)
          # and tag pushes don't trigger the "before field is missing"
          # warning. Using HEAD means the filter shows the diff of the
          # last commit (good enough for single-commit PRs).
          base: ${{ github.event.pull_request.base.sha || github.sha }}
          filters: |
            lint:
              - 'src/**/*.py'
              - 'tests/**/*.py'
              - 'pyproject.toml'
              - '.github/workflows/ci.yml'
            tests:
              - 'src/**/*.py'
              - 'tests/unit/**'
              - 'pyproject.toml'
            integration:
              - 'src/**/*.py'
              - 'tests/integration/**'
              - 'migrations/**'
              - 'docker/postgres/**'
            docker:
              - 'docker/postgres/**'
              - 'Dockerfile.publish'
              - 'migrations/**'
            workflow:
              - '.github/workflows/**'
            pkg:
              - 'src/**'
              - 'pyproject.toml'

  # --------------------------------------------------------------------------
  # Stage 1: Lint (ruff, actionlint)
  # --------------------------------------------------------------------------
  lint:
    name: lint
    needs: changes
    if: needs.changes.outputs.lint == 'true' || github.event_name == 'push' || github.event.inputs.force == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install ruff
        run: pip install "ruff>=0.6"
      - name: Run ruff
        run: ruff check src/ tests/
      - name: Check formatting
        run: ruff format --check src/ tests/
      - name: Validate pyproject.toml
        run: python3 -c "import tomllib; tomllib.load(open('pyproject.toml', 'rb'))"
      - name: Validate plugin.yaml
        run: python3 -c "import yaml; yaml.safe_load(open('src/hermes_memory/plugin.yaml'))"
      - name: Validate migrations are valid SQL (psql --check on syntax)
        run: |
          for f in migrations/*.sql; do
            echo "checking $f"
            # basic syntax: balanced parens, no obviously broken statements
            python3 -c "
          import re, sys
          src = open('$f').read()
          # comments start with --
          stripped = re.sub(r'--[^\n]*', '', src)
          # strings
          stripped = re.sub(r\"'[^']*'\", '', stripped)
          parens = stripped.count('(') - stripped.count(')')
          if parens != 0:
              sys.exit(f'unbalanced parens in $f: {parens}')
          "
          done

  # --------------------------------------------------------------------------
  # Stage 2: Unit tests (no PG required)
  # --------------------------------------------------------------------------
  unit:
    name: unit tests
    needs: changes
    if: needs.changes.outputs.tests == 'true' || github.event_name == 'push' || github.event.inputs.force == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --color=yes
      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: .coverage

  # --------------------------------------------------------------------------
  # Stage 3: Integration tests (testcontainers Postgres)
  # --------------------------------------------------------------------------
  integration:
    name: integration tests
    needs: changes
    if: needs.changes.outputs.integration == 'true' || github.event_name == 'push' || github.event.inputs.force == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        # Use the upstream pgvector base image for integration tests
        # (matches PG major in docker/postgres/Dockerfile). Migrations
        # are applied by the conftest from `migrations/*.sql`, so we
        # don't need the full hermes-postgres image here — that one
        # exists for production users, not for CI. Building it for
        # every PR was burning 30+ min and hitting the
        # `:dev` tag chicken-and-egg (the build job produces
        # `:dev-${{ github.sha }}` but the service container is
        # resolved before the build job runs).
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_USER: hermes
          POSTGRES_DB: hermes_test
        ports:
          - 10432:5432
        options: >-
          --health-cmd "pg_isready -U hermes -d hermes_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      HERMES_PG_CONN_STR: postgresql://hermes:testpass@127.0.0.1:10432/hermes_test
      HERMES_MEMORY_CI_BOOTSTRAP: '1'
      HERMES_EMBED_PROVIDER: ollama_local
      HERMES_EMBED_BASE_URL: http://127.0.0.1:11434/v1
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run integration tests
        run: pytest tests/integration/ -v --tb=short --color=yes

  # --------------------------------------------------------------------------
  # Stage 4: Build Postgres docker image (multi-arch)
  # --------------------------------------------------------------------------
  build-image:
    name: build docker image
    needs: changes
    if: needs.changes.outputs.docker == 'true' || startsWith(github.ref, 'refs/tags/v') || github.event.inputs.force == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ env.PLATFORMS }}
      - uses: docker/setup-buildx-action@v3
      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="dev-${{ github.sha }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "short=${{ github.sha }}" >> $GITHUB_OUTPUT
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          # Build context is the repo root (not docker/postgres/) so
          # the Dockerfile's `COPY migrations` finds the files at
          # the repo root. The Dockerfile path is still under
          # docker/postgres/ — buildx resolves the file relative to
          # the build context.
          context: .
          file: docker/postgres/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------------------------------
  # Stage 5: Smoke test — start the built image, init hermes_template,
  # apply migrations, run a sample remember+search, tear down.
  # --------------------------------------------------------------------------
  smoke-image:
    name: smoke test (image)
    needs: build-image
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Pull built image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
      - name: Start container
        run: |
          docker run -d --name hermes-smoke \
            -e POSTGRES_PASSWORD=test \
            -e POSTGRES_USER=hermes \
            -p 15432:5432 \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 10
      - name: Init schema
        run: |
          for f in migrations/*.sql; do
            PGPASSWORD=test psql -h 127.0.0.1 -p 15432 -U hermes -d postgres -f "$f"
          done
      - name: Verify
        run: |
          PGPASSWORD=test psql -h 127.0.0.1 -p 15432 -U hermes -d postgres -c \
            "SELECT count(*) AS schemas FROM information_schema.schemata WHERE schema_name LIKE 'hermes_%' OR schema_name = 'agent_memory';"
      - name: Teardown
        if: always()
        run: docker rm -f hermes-smoke || true

  # --------------------------------------------------------------------------
  # Stage 6: Publish PyPI (tag-driven only)
  # --------------------------------------------------------------------------
  publish-pypi:
    name: publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, unit, build-image]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write  # for PyPI trusted publishing
    environment:
      name: pypi
      url: https://pypi.org/p/hermes-memory
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install build
        run: pip install build
      - name: Build sdist + wheel
        run: python -m build
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
