name: build-docker

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/skb50bd/hermes-postgres
  BINARY_IMAGE: ghcr.io/skb50bd/hermes-memory-binary

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore + build
        run: |
          dotnet restore Hermes.Memory.sln
          dotnet build Hermes.Memory.sln -c Release --no-restore
      - name: Run unit tests
        run: dotnet test tests/Hermes.Memory.Tests/Hermes.Memory.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"

  build-binary-x64:
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Publish AOT binary (linux-x64)
        run: |
          dotnet publish src/Hermes.Memory.Cli/Hermes.Memory.Cli.csproj \
            -c Release -r linux-x64 \
            -p:PublishAot=true \
            -p:PublishSingleFile=true \
            -p:Version=${GITHUB_REF_NAME:-dev} \
            -p:SourceRevisionId=${GITHUB_SHA::7} \
            -o ./out/linux-x64

  build-binary-arm64:
    needs: unit-test
    runs-on: ubuntu-22.04-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Publish AOT binary (linux-arm64)
        run: |
          dotnet publish src/Hermes.Memory.Cli/Hermes.Memory.Cli.csproj \
            -c Release -r linux-arm64 \
            -p:PublishAot=true \
            -p:PublishSingleFile=true \
            -p:Version=${GITHUB_REF_NAME:-dev} \
            -p:SourceRevisionId=${GITHUB_SHA::7} \
            -o ./out/linux-arm64

  push-binary-image:
    if: github.event_name == 'push'
    needs: [build-binary-x64, build-binary-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push binary image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.publish
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.BINARY_IMAGE }}:${{ github.sha }}
            ${{ env.BINARY_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-postgres-image:
    needs: push-binary-image
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push Postgres image
        uses: docker/build-push-action@v5
        with:
          context: docker/postgres
          file: docker/postgres/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test-postgres:
    needs: build-postgres-image
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test the Postgres image
        run: |
          docker run --rm --name hermes-pg-smoke \
            -e POSTGRES_PASSWORD=*** \
            -e POSTGRES_DB=hermes_template \
            -d ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 30
          docker exec hermes-pg-smoke psql -U postgres -d hermes_template -c "SELECT extname FROM pg_extension ORDER BY extname;"
          docker exec hermes-pg-smoke psql -U postgres -d hermes_template -c "\dt agent_memory.*"
          docker stop hermes-pg-smoke
