name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: hermes_test
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore + build
        run: |
          dotnet restore Hermes.Memory.sln
          dotnet build Hermes.Memory.sln -c Release --no-restore

      - name: Install pg extensions (best-effort; integration test skips if unavailable)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-18-postgis-3 timescaledb-2-postgresql-18 || true
          PGPASSWORD=*** psql -h localhost -U postgres -d hermes_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
          PGPASSWORD=*** psql -h localhost -U postgres -d hermes_test -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
          PGPASSWORD=*** psql -h localhost -U postgres -d hermes_test -c "CREATE EXTENSION IF NOT EXISTS ltree;"
          PGPASSWORD=*** psql -h localhost -U postgres -d hermes_test -f docker/postgres/bin/01-schemas.sql || true

      - name: Run unit tests
        run: dotnet test tests/Hermes.Memory.Tests/Hermes.Memory.Tests.csproj -c Release --logger "console;verbosity=normal"

      - name: Run integration tests
        env:
          HERMES_PG_CONN_STR: postgresql://postgres:***@localhost:5432/hermes_test
        run: dotnet test tests/Hermes.Memory.Integration/Hermes.Memory.Integration.csproj -c Release --logger "console;verbosity=normal"
