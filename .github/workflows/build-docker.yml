name: build-docker

# Builds the hermes-postgres image (Postgres 18 + pgvector + extensions).
# Multi-arch via buildx + native arm64 variant of the base image — NO qemu,
# NO binfmt, NO matrix. One job, both archs, parallel inside buildx.

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Avoid concurrent builds clobbering the same tag.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/hermes-postgres
  # Use the short SHA on main pushes, the tag name on tag pushes, otherwise
  # a PR-scoped tag so we don't reuse `:latest` while iterating.
  IMAGE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || (github.ref == 'refs/heads/main' && format('main-{0}', github.sha_short) || format('pr-{0}', github.event.pull_request.number)) }}
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # buildx is preinstalled on GHA runners as of 2024, but we still call
      # the action to pin version + explicitly opt into the docker-container
      # driver. docker-container is required for multi-arch + cache-to=gha.
      # We do NOT install qemu or binfmt — buildx pulls the right native
      # variant of pgvector/pgvector:pg18 from the registry manifest list,
      # and PGDG/timescale repos publish arm64 packages.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:v0.18.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image refs
        id: refs
        run: |
          echo "tag=${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT
          echo "is_release=${{ github.ref_type == 'tag' }}" >> $GITHUB_OUTPUT
          echo "is_main=${{ github.ref == 'refs/heads/main' }}" >> $GITHUB_OUTPUT

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/postgres/Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ steps.refs.outputs.is_release && format('{0}/{1}:latest', env.REGISTRY, env.IMAGE_NAME) || '' }}
            ${{ steps.refs.outputs.is_main && format('{0}/{1}:latest', env.REGISTRY, env.IMAGE_NAME) || '' }}
          labels: |
            org.opencontainers.image.title=hermes-postgres
            org.opencontainers.image.description=Postgres 18 + pgvector + pg_trgm + ltree + timescaledb + pg_cron + apache-age for the Hermes Agent platform
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ env.IMAGE_TAG }}
          # GHA cache is disabled — the GHA build cache backend has been
          # returning 400 "Our services aren't available right now"
          # intermittently for several days, which fails the cache-from
          # import step at #9 and aborts the whole build. Build is fast
          # enough locally (~3min cold, ~1min warm) that the cache save
          # is not worth the flakiness. Re-enable when GHA cache is
          # stable again.
          cache-from: ""
          cache-to: ""

  smoke-test:
    # Smoke-test on every push, including PRs. We build a single-arch
    # ephemeral image (no push) to keep PR runtime low.
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build ephemeral test image
        run: |
          docker buildx build --load \
            --platform linux/amd64 \
            -t hermes-postgres:smoke \
            -f docker/postgres/Dockerfile .

      - name: Start container
        run: |
          docker run -d --name pg-smoke \
            -e POSTGRES_PASSWORD=*** \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_DB=postgres \
            hermes-postgres:smoke
          for i in {1..60}; do
            docker exec pg-smoke pg_isready -U postgres && break
            sleep 1
          done

      - name: Verify extensions + init script
        run: |
          # Run the bundled init script (creates hermes_template + hermes_cron)
          docker exec pg-smoke /usr/local/bin/hermes-init.sh
          # All 5 extensions must be present in hermes_template
          docker exec pg-smoke psql -U postgres -d hermes_template -tAc \
            "SELECT extname FROM pg_extension WHERE extname IN ('vector','pg_trgm','ltree','timescaledb','age') ORDER BY 1" \
            | tee /tmp/exts.txt
          test "$(wc -l < /tmp/exts.txt)" -eq 5 || (echo "expected 5 extensions, got:"; cat /tmp/exts.txt; exit 1)
          # All 5 user schemas must exist
          docker exec pg-smoke psql -U postgres -d hermes_template -tAc \
            "SELECT schema_name FROM information_schema.schemata WHERE schema_name IN ('agent_memory','hermes_wiki','hermes_journal','hermes_skills','hermes_metrics') ORDER BY 1" \
            | tee /tmp/schemas.txt
          test "$(wc -l < /tmp/schemas.txt)" -ge 5 || (echo "expected 5 schemas, got:"; cat /tmp/schemas.txt; exit 1)
          # Profile clone must succeed
          docker exec pg-smoke psql -U postgres -d postgres -c \
            "CREATE DATABASE hermes_test_clone TEMPLATE hermes_template CONNECTION LIMIT 5"
          docker exec pg-smoke psql -U postgres -d hermes_test_clone -tAc \
            "SELECT count(*) FROM information_schema.tables WHERE table_schema='agent_memory'"
          # pg_cron lives in hermes_cron only
          docker exec pg-smoke psql -U postgres -d hermes_cron -tAc \
            "SELECT extname FROM pg_extension WHERE extname='pg_cron'"

      - name: Cleanup
        if: always()
        run: docker rm -f pg-smoke 2>/dev/null || true
