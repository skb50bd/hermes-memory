# Hermes Postgres tuned configuration
# Conservative defaults for a single-host dev/prod deployment running
# multiple agent profile databases. Per-database connection limits are
# enforced via `ALTER DATABASE ... CONNECTION LIMIT 20`, not here.

# ---- Connections ----
max_connections = 200                    # headroom for all profiles
superuser_reserved_connections = 3
reserved_connections = 2

# ---- Memory (cap at ~2GB for a 2GB container) ----
shared_buffers = 512MB
effective_cache_size = 1GB
work_mem = 8MB
maintenance_work_mem = 128MB
huge_pages = try

# ---- WAL ----
wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 80MB
wal_compression = on

# ---- Planner ----
random_page_cost = 1.1                   # SSD
effective_io_concurrency = 200           # SSD
default_statistics_target = 100

# ---- Parallelism ----
max_worker_processes = 8
max_parallel_workers = 8
max_parallel_workers_per_gather = 2
max_parallel_maintenance_workers = 2

# ---- Logging ----
logging_collector = on
log_destination = 'stderr'
log_min_duration_statement = 250ms
log_checkpoints = on
log_connections = on
log_disconnections = on
log_line_prefix = '%m [%p] %q%u@%d from %h '

# ---- Extensions ----
cron.database_name = 'hermes_template'   # pg_cron lives in the template DB
timescaledb.telemetry_level = off
timescaledb.max_background_workers = 4

# ---- Locale ----
lc_messages = 'C.UTF-8'
lc_monetary = 'C.UTF-8'
lc_numeric = 'C.UTF-8'
lc_time = 'C.UTF-8'

# ---- Extensions need this for hash and GIN/GiST ----
shared_preload_libraries = 'pg_cron,timescaledb,age'
